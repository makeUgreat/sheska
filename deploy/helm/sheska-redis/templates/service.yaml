apiVersion: v1
kind: Service
metadata:
  name: {{ include "sheska-redis.fullname" . }}
  labels:
    {{- include "sheska-redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "sheska-redis.selectorLabels" . | nindent 4 }}
