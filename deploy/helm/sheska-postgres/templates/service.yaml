apiVersion: v1
kind: Service
metadata:
  name: {{ include "sheska-postgres.fullname" . }}
  labels:
    {{- include "sheska-postgres.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    {{- include "sheska-postgres.selectorLabels" . | nindent 4 }}
