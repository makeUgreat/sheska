apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sheska-redis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/makeUgreat/sheska.git
    path: deploy/helm/sheska-redis
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: sheska
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
