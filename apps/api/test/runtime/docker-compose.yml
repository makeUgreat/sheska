services:
  db:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: sheska_test
      POSTGRES_USER: sheska
      POSTGRES_PASSWORD: sheska
      PGDATA: /var/lib/postgresql/data
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sheska -d sheska_test']
      start_period: 10s
      start_interval: 1s
      interval: 2s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    tmpfs:
      - /data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      start_period: 5s
      start_interval: 1s
      interval: 2s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../../../..
      dockerfile: apps/api/Dockerfile
    command: ['node', 'dist/database/migrate']
    environment:
      NODE_ENV: test
      DATABASE_URL: postgres://sheska:sheska@db:5432/sheska_test
    depends_on:
      db:
        condition: service_healthy

  api:
    build:
      context: ../../../..
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: test
      PORT: 3000
      DATABASE_URL: postgres://sheska:sheska@db:5432/sheska_test
      REDIS_URL: redis://redis:6379
      EMBEDDING_BASE_URL: http://ollama-unavailable:11434
    ports:
      - '127.0.0.1::3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/readyz'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      start_period: 10s
      start_interval: 1s
      interval: 2s
      timeout: 5s
      retries: 10
