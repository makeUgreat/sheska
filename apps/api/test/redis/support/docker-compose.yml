services:
  redis:
    image: redis:8-alpine
    container_name: sheska.test.redis
    ports:
      - "56379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      start_interval: 1s
      interval: 2s
      timeout: 5s
      retries: 5
