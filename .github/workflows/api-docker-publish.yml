name: API Docker Publish

on:
  push:
    branches:
      - master
    paths:
      - 'apps/api/**'
      - '!apps/api/deploy/**'
  workflow_dispatch:

env:
  IMAGE_NAME: sheska-api
  DOCKER_HUB_USERNAME: willom2c

jobs:
  build:
    runs-on: [self-hosted, sheska]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_HASH_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Save image tag to artifact
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | grep "sha-" | head -n1 | sed 's/.*://')
          echo "$TAG" > /tmp/image-tag.txt
          echo "Image tag: $TAG"

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: /tmp/image-tag.txt
          retention-days: 7

      - name: Clean up old local images (keep last 10)
        if: always()
        run: |
          IMAGE=${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          OLD_IMAGES=$(docker images "${IMAGE}" --format "{{.ID}} {{.CreatedAt}}" | sort -k2 | head -n -10 | awk '{print $1}')
          if [ -n "$OLD_IMAGES" ]; then
            echo "$OLD_IMAGES" | xargs -r docker rmi -f || true
          fi

      - name: Clean up dangling images
        if: success()
        run: |
          docker image prune -f
