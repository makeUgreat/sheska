name: API Deploy

on:
  workflow_run:
    workflows: ["API Docker Publish"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      sha:
        description: '배포할 커밋 SHA (생략 시 master의 최신 커밋)'
        required: false
        default: ''

concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

env:
  IMAGE_NAME: sheska-api
  BOT_NAME: "sheska-deploy[bot]"
  BOT_EMAIL: "sheska-deploy[bot]@bot.com"

jobs:
  update-helm:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: [self-hosted, sheska]
    steps:
      - name: Download image tag artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG=$(cat image-tag.txt)
          else
            SHA="${{ inputs.sha }}"
            [ -z "$SHA" ] && SHA="${{ github.sha }}"
            TAG="sha-${SHA}"
          fi

          if [ -z "$TAG" ]; then
            echo "::error::이미지 태그를 결정할 수 없습니다"
            exit 1
          fi

          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ github.token }}

      - name: Update image tag in values.yaml
        uses: mikefarah/yq@v4
        with:
          cmd: |
            yq eval -i '
              .image.tag = "${{ steps.tag.outputs.value }}"
            ' ./deploy/helm/${{ env.IMAGE_NAME }}/values.yaml

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 ci(deploy): update ${{ env.IMAGE_NAME }} image tag

            - Application: ${{ env.IMAGE_NAME }}
            - New Tag: ${{ steps.tag.outputs.value }}
            - Workflow: ${{ github.workflow }}
            - Triggered by: ${{ github.actor }}
            - Build URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Auto-generated by GitHub Actions
          branch: master
          file_pattern: "deploy/helm/${{ env.IMAGE_NAME }}/values.yaml"
          commit_user_name: ${{ env.BOT_NAME }}
          commit_user_email: ${{ env.BOT_EMAIL }}
